<!DOCTYPE html>
<html>
<head>
  <title>Student Form Validation</title>
</head>
<body>

  <h2>Student Registration Form</h2>

  <form onsubmit="return validateForm()">

    <label>Name:</label><br>
    <input type="text" id="name"><br>
    <span id="nameError"></span><br><br>

    <label>Email:</label><br>
    <input type="text" id="email"><br>
    <span id="emailError"></span><br><br>

    <label>Phone Number:</label><br>
    <input type="text" id="phone"><br>
    <span id="phoneError"></span><br><br>

    <label>Password:</label><br>
    <input type="password" id="password"><br>
    <span id="passError"></span><br><br>

    <button type="submit">Register</button>

  </form>

  <script>
    function validateForm() {

      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let phone = document.getElementById("phone").value;
      let password = document.getElementById("password").value;

      let valid = true;

      if (name === "") {
        document.getElementById("nameError").innerText = "Name is required";
        valid = false;
      } else {
        document.getElementById("nameError").innerText = "";
      }

      if (email === "" || !email.includes("@")) {
        document.getElementById("emailError").innerText = "Enter valid email";
        valid = false;
      } else {
        document.getElementById("emailError").innerText = "";
      }

      if (phone.length !== 10 || isNaN(phone)) {
        document.getElementById("phoneError").innerText = "Enter 10 digit number";
        valid = false;
      } else {
        document.getElementById("phoneError").innerText = "";
      }

      if (password.length < 6) {
        document.getElementById("passError").innerText = "Password must be 6+ characters";
        valid = false;
      } else {
        document.getElementById("passError").innerText = "";
      }

      return valid;
    }
  </script>

</body>
</html>
