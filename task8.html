<!DOCTYPE html>
<html>
<head>
    <title>Text Input Validation</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
        }
        input{
            width:250px;
            padding:8px;
        }
        button{
            padding:8px 15px;
            margin-top:10px;
        }
        #msg{
            margin-top:10px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h2>User Registration</h2>

<label>Enter Username:</label><br><br>

<input type="text" id="username" placeholder="Enter username">
<br><br>

<button onclick="validateInput()">Submit</button>

<p id="msg"></p>

<script>
function validateInput()
{
    let name = document.getElementById("username").value.trim();
    let message = document.getElementById("msg");

    if(name == "")
    {
        message.innerHTML = "Username cannot be empty.";
        message.style.color = "red";
    }
    else if(name.length < 5)
    {
        message.innerHTML = "Username must contain at least 5 characters.";
        message.style.color = "red";
    }
    else if(!/^[A-Za-z]+$/.test(name))
    {
        message.innerHTML = "Username should contain only alphabets.";
        message.style.color = "red";
    }
    else
    {
        message.innerHTML = "Username is valid.";
        message.style.color = "green";
    }
}
</script>

</body>
</html>
