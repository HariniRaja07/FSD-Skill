<!DOCTYPE html>
<html>
<head>
    <title>Quote Generator</title>
    <style>
        body {
            background-color: #e6f7ff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        h2 {
            color: #0066cc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004d99;
        }
    </style>
</head>
<body>

    <h2 id="quote">Click the button for today's motivation!</h2>

    <button onclick="showQuote()">Show Quote</button>

    <script>
        function showQuote() {
            alert("Believe in yourself and all that you are!");
            document.getElementById("quote").textContent =
            "Success starts with self-confidence and hard work.";
        }
    </script>

</body>
</html>
